<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Antilibrary — Hearth (prototype)</title>
<meta name="description" content="A prototype: every ember is something that lit me up. Hover, then click to read." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   THE ANTILIBRARY — HEARTH PROTOTYPE
   Warm core + cool crystalline glass embers. Each ember = one entry.
   Canvas-2D, zero dependencies. Tune with ?intensity=0.4 .. 1.0
   ============================================================ */
:root{
  --paper:#efe6d1; --paper-deep:#e7dabb; --paper-edge:#d9c9a3;
  --ink:#23201a; --ink-soft:#4a4338; --graphite:#756a56;
  --green:#1b3a2c; --green-2:#2c5740; --green-pale:#5f7d68;
  --leather:#6c4827; --leather-2:#95683a;
  --gold:#ad8742; --gold-2:#c9a860; --rose:#7a3b32;
  --night:#0e1611;          /* the dusk woods behind the fire */
  --serif:"Fraunces",Georgia,serif;
  --read:"Newsreader",Georgia,serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --ease:cubic-bezier(.2,.7,.2,1);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;background:var(--night);color:#e7ddc4;
  font-family:var(--read);overflow:hidden;
  -webkit-font-smoothing:antialiased;
  /* a dim warm dusk wash so the page looks lit even before canvas paints */
  background-image:
    radial-gradient(120% 80% at 50% 118%, rgba(173,135,66,.16), transparent 60%),
    radial-gradient(140% 120% at 50% 130%, rgba(108,72,39,.16), transparent 55%);
}
#hearth{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:block;touch-action:none}

/* ---- quiet stage UI over the fire ---- */
.stage{position:fixed;inset:0;z-index:2;pointer-events:none}
.brand{position:absolute;top:max(18px,env(safe-area-inset-top));left:24px;
  font-family:var(--serif);font-size:18px;letter-spacing:.01em;color:#e9dfc6;opacity:.86}
.brand b{color:var(--gold-2);font-weight:600}
.hint{position:absolute;left:0;right:0;bottom:max(26px,env(safe-area-inset-bottom));
  text-align:center;font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;
  text-transform:uppercase;color:#bcae8e;opacity:.7;transition:opacity .8s var(--ease);padding:0 20px}
.hint.gone{opacity:0}
.proto-flag{position:absolute;top:max(18px,env(safe-area-inset-top));right:20px;
  font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#7e8d7a;opacity:.6}

/* ---- ember tooltip (real DOM, crisp type) ---- */
.ember-tip{position:fixed;z-index:4;pointer-events:none;transform:translate(-50%,-140%);
  opacity:0;transition:opacity .2s var(--ease);white-space:nowrap;text-align:center}
.ember-tip.show{opacity:1}
.ember-tip b{display:block;font-family:var(--serif);font-weight:600;font-size:17px;color:#f3ead2;
  text-shadow:0 1px 8px rgba(0,0,0,.7)}
.ember-tip span{font-family:var(--read);font-style:italic;font-size:13px;color:#cdbf9d;text-shadow:0 1px 6px rgba(0,0,0,.7)}

/* ---- accessible entry list: focusable, reachable by Tab/screen-reader ---- */
.ember-list{position:fixed;left:-9999px;top:0}
.ember-list a:focus{position:fixed;left:24px;bottom:64px;z-index:5;
  font-family:var(--mono);font-size:13px;color:#f3ead2;background:rgba(14,22,17,.9);
  border:1px solid var(--gold);padding:8px 14px;border-radius:4px;outline:none}

/* =================== GLASS REVIEW PANEL =================== */
dialog.hearth-panel{
  border:0;padding:0;max-width:680px;width:calc(100% - 36px);max-height:86vh;
  background:rgba(239,230,209,.80);color:var(--ink);
  border-radius:6px;box-shadow:0 40px 90px -30px rgba(0,0,0,.7), 0 0 0 1px rgba(173,135,66,.5);
  backdrop-filter:blur(16px) saturate(1.08);-webkit-backdrop-filter:blur(16px) saturate(1.08);
  overflow:auto;opacity:0;transform:translateY(10px) scale(.985);
  transition:opacity .26s var(--ease),transform .26s var(--ease)}
dialog.hearth-panel[open]{opacity:1;transform:none}
dialog.hearth-panel::backdrop{background:rgba(8,12,9,.62);backdrop-filter:blur(2px)}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
  dialog.hearth-panel{background:var(--paper-deep)} /* legible fallback */
}
.panel-top{height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.item{padding:40px clamp(22px,5vw,52px) 44px;position:relative}
.item__close{position:absolute;top:14px;right:16px;width:34px;height:34px;border-radius:50%;
  border:1px solid var(--paper-edge);background:rgba(255,255,255,.3);color:var(--leather);
  font-size:18px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:all .2s}
.item__close:hover{border-color:var(--gold);color:var(--ink)}
.item__type{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--green-2);margin-bottom:12px}
.item__title{font-family:var(--serif);font-weight:600;font-size:clamp(28px,5vw,40px);line-height:1.05;margin:0 0 4px}
.item__creator{font-family:var(--read);font-style:italic;font-size:19px;color:var(--ink-soft);margin-bottom:16px}
.item__meta{font-family:var(--mono);font-size:11.5px;color:var(--graphite);letter-spacing:.03em;
  display:flex;flex-wrap:wrap;gap:6px 18px;padding:13px 0;border-top:1px solid var(--paper-edge);border-bottom:1px solid var(--paper-edge)}
.item__meta b{color:var(--leather);font-weight:500}
.item__tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 26px}
.item__tags span{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--leather);
  background:rgba(149,104,58,.13);border:1px solid rgba(149,104,58,.26);padding:3px 9px;border-radius:3px}
.item-body{font-family:var(--read);font-size:18px;line-height:1.72;color:var(--ink)}
.item-body p{margin:0 0 20px}
.item-body p:first-of-type::first-letter{font-family:var(--serif);font-weight:600;float:left;font-size:58px;line-height:.78;padding:6px 11px 0 0;color:var(--leather)}
.item-body blockquote{margin:24px 0;padding:6px 0 6px 22px;border-left:2px solid var(--gold);font-family:var(--serif);font-style:italic;font-size:21px;color:var(--ink-soft)}
.item-body em.unlit{color:var(--green-2)}
.reduced-note{position:fixed;left:0;right:0;bottom:max(54px,calc(env(safe-area-inset-bottom) + 30px));
  text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6f7e6b;opacity:.5;z-index:2}
</style>
</head>
<body>

<canvas id="hearth" aria-hidden="true"></canvas>

<div class="stage" aria-hidden="true">
  <div class="brand">The <b>Antilibrary</b></div>
  <div class="proto-flag">hearth · prototype</div>
  <div class="hint" id="hint">each ember is something that lit me up — hover, then click to read</div>
</div>

<div class="ember-tip" id="tip" aria-hidden="true"><b></b><span></span></div>

<!-- The real, accessible content: every entry as a focusable link (keyboard + screen reader path) -->
<nav class="ember-list" id="emberList" aria-label="The library — entries"></nav>

<!-- The glass review panel -->
<dialog class="hearth-panel" id="panel" aria-labelledby="panelTitle">
  <div class="panel-top"></div>
  <article class="item" id="panelBody"></article>
</dialog>

<script>
(function(){
"use strict";

/* ========== ENTRIES (prototype data — same shape as entries.json) ========== */
const ENTRIES = [
  { slug:"shadow-of-the-torturer", title:"The Shadow of the Torturer", creator:"Gene Wolfe",
    type:"book", status:"consumed", impact:5, date:"2026 · 02", via:"r/printSF",
    tags:["science-fiction","memory","unreliable-narrator"],
    reviewHtml:`<p>Severian remembers everything, and that is exactly why you can trust nothing he tells you. A torturer who cannot forget, narrating his own exile — the premise is a trap, and Wolfe lets you walk into it page by page.</p>
    <p>What stuck wasn't the plot but the texture: a far-future Earth so old it has forgotten it's science fiction, told in a borrowed-Latin vocabulary that makes you feel the centuries.</p>
    <blockquote>"I never forget anything." — and the whole book is the cost of that sentence.</blockquote>
    <p>A book you have to re-read is a feature, not a flaw. For the way my memory works, the re-read <em>is</em> the encoding.</p>` },
  { slug:"meditations", title:"Meditations", creator:"Marcus Aurelius",
    type:"book", status:"consumed", impact:5, date:"2026 · 01", via:"a worn copy",
    tags:["stoicism","re-read"],
    reviewHtml:`<p>Not a book so much as a man arguing himself into composure, night after night, never meaning for anyone to read it. That's the whole appeal — it's private, so it doesn't perform.</p>
    <blockquote>"You could leave life right now. Let that determine what you do and say and think."</blockquote>
    <p>I keep coming back to it the way you return to a fire — not for new information, for the temperature.</p>` },
  { slug:"the-bear", title:"The Bear", creator:"Christopher Storer",
    type:"film", status:"consumed", impact:4, date:"2026 · 03", via:"a friend",
    tags:["craft","pressure"],
    reviewHtml:`<p>A show about the violence of caring too much about your work. The kitchen is just the excuse. Watched the whole thing with my shoulders up by my ears.</p>` },
  { slug:"sandworm", title:"Sandworm", creator:"Andy Greenberg",
    type:"book", status:"consumed", impact:4, date:"2026 · 04", via:"work",
    tags:["security","cyberwar"],
    reviewHtml:`<p>The clearest account I've read of how a line of code becomes a blackout. Reads like a thriller; lands like a warning. Useful for the day job, but it earns its place for the dread.</p>` },
  { slug:"the-daily-stoic", title:"The Daily Stoic", creator:"Ryan Holiday",
    type:"podcast", status:"consumed", impact:3, date:"daily", via:"the 06:30 ritual",
    tags:["stoicism","ritual"],
    reviewHtml:`<p>Ten minutes while the coffee brews. Not deep, by design — it's a reset, not a seminar. The value is the streak, not any single episode.</p>` },
  { slug:"discourses", title:"Discourses", creator:"Epictetus",
    type:"book", status:"to-consume", impact:4, date:"queued 2026 · 02", via:"after Meditations",
    tags:["stoicism"],
    reviewHtml:`<p><em class="unlit">Still in the antilibrary — not yet read.</em></p><p>Queued because Meditations kept quoting the man it was learning from. Waiting for the right cold evening.</p>` },
  { slug:"claw-of-the-conciliator", title:"The Claw of the Conciliator", creator:"Gene Wolfe",
    type:"book", status:"to-consume", impact:5, date:"queued 2026 · 03", via:"finished vol. 1",
    tags:["science-fiction"],
    reviewHtml:`<p><em class="unlit">Still in the antilibrary — not yet read.</em></p><p>Volume two. I'm rationing it. Some books you don't want to be done with.</p>` },
];

/* ========== CONFIG ("the cozy knob" — also via ?intensity= / ?embers=) ========== */
const Q = new URLSearchParams(location.search);
let INTENSITY = clamp(parseFloat(Q.get("intensity")) || 0.55, 0.2, 1);
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const coarse = matchMedia("(pointer: coarse)").matches;

const cv = document.getElementById("hearth");
const ctx = cv.getContext("2d", { alpha:true });
let W=0,H=0,DPR=1, cx=0, baseY=0;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.style.width = W+"px"; cv.style.height = H+"px";
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  cx = W*0.5;
  baseY = H - Math.max(70, H*0.14);
}
window.addEventListener("resize", debounce(()=>{ resize(); if(frozen) drawStaticFrame(); }, 150));

/* ========== POINTER ========== */
const ptr = { x: -1, y: -1, sx: 0, sy: 0, active:false };
function setPtr(x,y){ ptr.x=x; ptr.y=y; ptr.active=true; }
cv.addEventListener("pointermove", e=>{ setPtr(e.clientX, e.clientY); hover(e.clientX,e.clientY); dismissHint(); }, {passive:true});
cv.addEventListener("pointerleave", ()=>{ ptr.active=false; clearHover(); });
cv.addEventListener("pointerdown", e=>{ setPtr(e.clientX,e.clientY); const hit=pick(e.clientX,e.clientY); if(hit) openPanel(hit.entry); }, {passive:true});

/* ========== PALETTE (rgb tuples) ========== */
const C = {
  emberCore:[214,240,232], emberRim:[201,168,96], teal:[120,182,168],
  warm:[173,135,66], rose:[122,59,50], white:[255,247,228], leather:[149,104,58],
  night:[14,22,17],
};
const rgba=(t,a)=>`rgba(${t[0]},${t[1]},${t[2]},${a})`;

/* ========== EMBER SPRITES (pre-rendered, crystalline) ========== */
function makeSprite(consumed){
  const S=160, s=document.createElement("canvas"); s.width=s.height=S;  // hi-res → crisp on retina
  const g=s.getContext("2d"); const c=S/2;
  const core = consumed ? C.emberCore : C.teal;

  // soft cool halo
  const glow=g.createRadialGradient(c,c,0,c,c,c);
  glow.addColorStop(0, rgba(core, consumed?0.42:0.22));
  glow.addColorStop(.22, rgba(core, consumed?0.18:0.10));
  glow.addColorStop(.55, rgba(C.teal, consumed?0.07:0.04));
  glow.addColorStop(1, rgba(core,0));
  g.fillStyle=glow; g.fillRect(0,0,S,S);

  g.translate(c,c);
  g.globalCompositeOperation="lighter";

  // bright tight core
  const rC = consumed?16:11;
  const cr=g.createRadialGradient(0,0,0,0,0,rC);
  cr.addColorStop(0, rgba(C.white, consumed?0.95:0.45));
  cr.addColorStop(.45, rgba(core, consumed?0.55:0.28));
  cr.addColorStop(1, rgba(core,0));
  g.fillStyle=cr; g.beginPath(); g.arc(0,0,rC,0,7); g.fill();

  // soft sparkle rays — fade at the tips, no hard edges (the FF gleam)
  const spindle=(L,w)=>{ g.beginPath(); g.moveTo(0,-L); g.lineTo(w,0); g.lineTo(0,L); g.lineTo(-w,0); g.closePath(); g.fill(); };
  if(consumed){
    const len=c*0.92;
    const sg=g.createRadialGradient(0,0,0,0,0,len);
    sg.addColorStop(0, rgba(C.white,.80)); sg.addColorStop(.35, rgba(core,.35)); sg.addColorStop(1, rgba(core,0));
    g.fillStyle=sg;
    spindle(len,3);
    g.save(); g.rotate(Math.PI/2); spindle(len,3); g.restore();
    g.save(); g.rotate(Math.PI/4); spindle(len*0.55,2.2); g.restore();
    g.save(); g.rotate(-Math.PI/4); spindle(len*0.55,2.2); g.restore();
  } else {
    // unlit (to-consume): a single faint, quiet glint
    const sg=g.createRadialGradient(0,0,0,0,0,c*0.5);
    sg.addColorStop(0, rgba(C.teal,.28)); sg.addColorStop(1, rgba(C.teal,0));
    g.fillStyle=sg; spindle(c*0.45,2);
  }
  return s;
}
const SPR = { consumed: makeSprite(true), unlit: makeSprite(false) };

/* ========== EMBERS (object pool, bound to entries) ========== */
function maxEmbers(){ return Math.round((coarse?14:24) * (0.5+0.5*INTENSITY)); }
class Ember{ constructor(){ this.reset(); }
  reset(){ this.alive=false; this.x=0;this.y=0;this.vx=0;this.vy=0;this.age=0;this.life=1;
    this.size=1;this.rot=0;this.rotV=0;this.seed=Math.random()*99;this.entry=null;this.hot=0;this.pinned=false;this.base=0.6; }
}
const pool = Array.from({length: 28}, ()=>new Ember());
let bag=[]; // shuffle bag of entry indices, impact-weighted
function refillBag(){ bag=[]; ENTRIES.forEach((e,i)=>{ const n=1+Math.round((e.impact||3)/2); for(let k=0;k<n;k++) bag.push(i); }); for(let i=bag.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[bag[i],bag[j]]=[bag[j],bag[i]];} }
refillBag();
function spawn(){
  if(!bag.length) refillBag();
  const e = pool.find(p=>!p.alive); if(!e) return;
  const entry = ENTRIES[bag.pop()];
  const consumed = entry.status==="consumed";
  e.reset(); e.alive=true; e.entry=entry;
  e.x = cx + (Math.random()-0.5)*46;
  e.y = baseY - 30 - Math.random()*30;
  e.vx = (Math.random()-0.5)*0.18;
  e.vy = -(0.34 + Math.random()*0.30) * (0.8 + (entry.impact||3)/10);
  e.life = 6500 + Math.random()*5000;
  e.size = (consumed?0.85:0.72) + (entry.impact||3)/10 + Math.random()*0.2;
  e.rot = Math.random()*Math.PI; e.rotV = (Math.random()-0.5)*0.0009;
  e.base = consumed ? 0.85 : 0.5;
}

/* ========== HIT TESTING ========== */
let hovered=null;
function emberScreen(e){ return {x:e.x, y:e.y}; }
function pick(x,y){
  let best=null,bd=1e9; const R= coarse?38:30;
  for(const e of pool){ if(!e.alive) continue;
    const d=Math.hypot(e.x-x, e.y-y); if(d<R && d<bd){bd=d;best=e;} }
  return best;
}
const tip=document.getElementById("tip"), tipB=tip.querySelector("b"), tipS=tip.querySelector("span");
function hover(x,y){ const e=pick(x,y);
  if(e!==hovered){ if(hovered) hovered.pinned=false; hovered=e; if(e) e.pinned=true; }
  if(e){ tipB.textContent=e.entry.title; tipS.textContent=e.entry.creator;
    tip.style.left=e.x+"px"; tip.style.top=e.y+"px"; tip.classList.add("show"); cv.style.cursor="pointer"; }
  else clearHover();
}
function clearHover(){ if(hovered){hovered.pinned=false;hovered=null;} tip.classList.remove("show"); cv.style.cursor="default"; }

/* ========== DRAW: glow bed + flame + bloom ========== */
let t0=performance.now();
/* glow-dot sprites (soft body + sparkle glints) */
function makeGlow(tup){ const S=24,s=document.createElement("canvas"); s.width=s.height=S; const g=s.getContext("2d"); const c=S/2;
  const gr=g.createRadialGradient(c,c,0,c,c,c);
  gr.addColorStop(0,rgba(tup,0.9)); gr.addColorStop(.4,rgba(tup,0.30)); gr.addColorStop(1,rgba(tup,0));
  g.fillStyle=gr; g.fillRect(0,0,S,S); return s; }
const GLOW={ warm:makeGlow(C.warm), white:makeGlow(C.white) };

/* THE FLAME = a shimmering point-cloud (the crystalline-particle technique) */
const BANDS=6, bandCol=[];
function computeBands(){ const stops=[[150,52,40],[196,96,40],[210,140,55],[226,176,96],[240,216,162],[255,247,228]];
  bandCol.length=0; for(let b=0;b<BANDS;b++) bandCol.push(stops[Math.min(stops.length-1, Math.round(b/(BANDS-1)*(stops.length-1)))]); }
let FPbands=[], FPspark=[];
function buildFlame(){ computeBands();
  const n=Math.round((coarse?720:1300)*(0.45+0.55*INTENSITY));
  FPbands=Array.from({length:BANDS},()=>[]); FPspark=[];
  for(let i=0;i<n;i++){
    const h=Math.pow(Math.random(),1.5);                            // denser at the base
    const side=((Math.random()+Math.random()+Math.random())/3)*2-1; // center-biased fill
    const p={h, side, seed:Math.random()*99};
    if(Math.random()<0.06) FPspark.push(p); else FPbands[Math.min(BANDS-1,Math.floor(h*BANDS))].push(p);
  }
}
function halfW(h,W0){ return W0*Math.pow(1-h,0.62)*(0.5+0.5*Math.sin(h*Math.PI*0.92)); } // teardrop
function drawFlame(time){
  let leanX=0; if(ptr.active && ptr.y>baseY-H*0.7) leanX=clamp((ptr.x-cx)*0.05,-18,18);
  ptr.sx += (leanX-ptr.sx)*0.05;
  const breathe=0.94+0.06*Math.sin(time*0.0016);
  const flameH=Math.min(H*0.46, 150+150*INTENSITY)*breathe;
  const W0=62*(0.85+0.3*INTENSITY);
  const amp=8+9*INTENSITY;

  // glow bed (coals)
  const gb=ctx.createRadialGradient(cx,baseY,0,cx,baseY,150*breathe);
  gb.addColorStop(0, rgba(C.warm,0.40*INTENSITY+0.16)); gb.addColorStop(.4, rgba(C.leather,0.15)); gb.addColorStop(1, rgba(C.leather,0));
  ctx.fillStyle=gb; ctx.beginPath(); ctx.ellipse(cx,baseY,150*breathe,60*breathe,0,0,7); ctx.fill();

  ctx.globalCompositeOperation="lighter";
  // soft warm underglow so the cloud reads as one flame, not confetti
  ctx.save(); ctx.translate(cx,baseY-flameH*0.4); ctx.scale(0.55,1);
  const bg=ctx.createRadialGradient(0,0,0,0,0,flameH*0.7);
  bg.addColorStop(0,rgba(C.warm,0.10*INTENSITY+0.05)); bg.addColorStop(1,rgba(C.warm,0));
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,flameH*0.7,0,7); ctx.fill(); ctx.restore();

  // shimmering points — one fillStyle per colour band (fast)
  for(let b=0;b<BANDS;b++){ const c=bandCol[b];
    const a=(0.14+0.12*INTENSITY)*(0.6+0.4*Math.sin(time*0.004+b));
    ctx.fillStyle=`rgba(${c[0]},${c[1]},${c[2]},${a.toFixed(3)})`;
    const arr=FPbands[b];
    for(let k=0;k<arr.length;k++){ const p=arr[k], h=p.h;
      const hw=halfW(h,W0);
      const sway=Math.sin(time*0.0022+h*4+p.seed*0.3)*amp*h + Math.sin(time*0.0012+p.seed)*amp*0.4*h;
      const x=cx+ptr.sx*h+sway+p.side*hw + (Math.random()-0.5)*1.8;
      const y=baseY-h*flameH + (Math.random()-0.5)*1.8;
      ctx.fillRect(x-1,y-1,2.2,2.2);
    }
  }
  // sparkle glints
  for(let k=0;k<FPspark.length;k++){ const p=FPspark[k], h=p.h;
    const hw=halfW(h,W0);
    const sway=Math.sin(time*0.0022+h*4+p.seed*0.3)*amp*h;
    const x=cx+ptr.sx*h+sway+p.side*hw, y=baseY-h*flameH;
    const tw=0.5+0.5*Math.sin(time*0.006+p.seed*5);
    const sz=2.2+2.6*tw, spr=h>0.72?GLOW.white:GLOW.warm;
    ctx.globalAlpha=clamp(0.25+0.5*tw,0,1); ctx.drawImage(spr,x-sz,y-sz,sz*2,sz*2);
  }
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation="source-over";
}

/* a few cool snow motes — "fire in the snow" */
const snow = Array.from({length:14},()=>({x:Math.random(),y:Math.random(),s:0.2+Math.random()*0.5,d:Math.random()*6}));
function drawSnow(time){
  ctx.save(); ctx.globalCompositeOperation="source-over";
  for(const f of snow){
    const y=((f.y + (time*0.000012*f.s)) % 1);
    const x=(f.x + Math.sin(time*0.0004+f.d)*0.01);
    ctx.fillStyle=rgba([220,232,226], 0.14*f.s);
    ctx.beginPath(); ctx.arc(x*W, y*H, f.s*1.6, 0, 7); ctx.fill();
  }
  ctx.restore();
}

function drawEmbers(time){
  ctx.globalCompositeOperation="lighter";
  for(const e of pool){ if(!e.alive) continue;
    const lifeF = e.age/e.life;
    let a = e.base * (0.7+0.3*Math.sin(time*0.004+e.seed));
    a *= (1 - Math.max(0, (lifeF-0.7)/0.3));         // fade out near end
    a *= Math.min(1, e.age/500);                       // fade in
    e.hot += (((e.pinned)?1:0)-e.hot)*0.12;
    const sc = (e.size*(0.7+0.5*INTENSITY)) * (1+e.hot*0.5);
    const spr = e.entry.status==="consumed"?SPR.consumed:SPR.unlit;
    ctx.save(); ctx.globalAlpha=clamp(a+e.hot*0.4,0,1);
    ctx.translate(e.x,e.y); ctx.rotate(e.rot);
    ctx.drawImage(spr, -40*sc, -40*sc, 80*sc, 80*sc);
    ctx.restore();
  }
  ctx.globalCompositeOperation="source-over";
}

/* ========== UPDATE ========== */
let spawnAcc=0;
function update(dt,time){
  spawnAcc += dt;
  const interval = 1050 / (0.5+INTENSITY);
  let live=0; for(const e of pool) if(e.alive) live++;
  if(spawnAcc>interval && live<maxEmbers()){ spawnAcc=0; spawn(); }
  for(const e of pool){ if(!e.alive) continue;
    e.age+=dt;
    if(!e.pinned){
      // gentle pointer attraction
      if(ptr.active){ const dx=ptr.x-e.x, dy=ptr.y-e.y, d=Math.hypot(dx,dy);
        if(d<210 && d>1){ const f=(1-d/210)*0.010*INTENSITY; const rep = d<48?-0.5:1; e.vx+=dx/d*f*rep; e.vy+=dy/d*f*rep; } }
      e.vy += -0.0009*dt;                 // buoyancy
      e.vx += Math.sin(time*0.001+e.seed)*0.0006*dt;
      e.vx*=0.996;
      e.x+=e.vx*dt*0.06; e.y+=e.vy*dt*0.06; e.rot+=e.rotV*dt;
    }
    if(e.age>e.life || e.y< -40){ e.alive=false; e.entry=null; }
  }
  if(hovered){ tip.style.left=hovered.x+"px"; tip.style.top=hovered.y+"px"; }
}

/* ========== LOOP (dt-clamped, fps-adaptive, visibility-paused) ========== */
let raf=0, last=performance.now(), frozen=false;
let probe=[], probed=false;
function frame(now){
  const dt=Math.min(now-last,33); last=now;
  // adaptive: sample first ~50 frames, drop intensity if slow
  if(!probed){ probe.push(dt); if(probe.length>=50){ probed=true;
    const avg=probe.reduce((a,b)=>a+b,0)/probe.length;
    if(avg>26){ INTENSITY=Math.max(0.3,INTENSITY*0.7); } } }
  // trail fade — leaves a soft ethereal smear instead of a hard clear
  ctx.globalCompositeOperation="source-over";
  ctx.fillStyle="rgba(14,22,17,0.26)"; ctx.fillRect(0,0,W,H);
  drawFlame(now); drawEmbers(now); drawSnow(now);
  update(dt, now);
  raf=requestAnimationFrame(frame);
}
function start(){ if(frozen||raf) return; last=performance.now(); raf=requestAnimationFrame(frame); }
function stop(){ cancelAnimationFrame(raf); raf=0; }
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) stop(); else start(); });

/* ========== REDUCED-MOTION STATIC FRAME ========== */
function drawStaticFrame(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.globalCompositeOperation="source-over"; ctx.fillStyle="#0e1611"; ctx.fillRect(0,0,W,H);
  // still glow + flame
  drawFlame(1200);
  // scatter embers in a gentle constellation, bound to entries (static, still clickable)
  ctx.globalCompositeOperation="lighter";
  let i=0; for(const e of pool){ e.alive=false; }
  ENTRIES.forEach((entry,idx)=>{
    const e=pool[idx]; e.reset(); e.alive=true; e.entry=entry; e.pinned=true; e.age=1000; e.life=1e9; e.base=entry.status==="consumed"?0.9:0.55;
    const ang = -Math.PI/2 + (idx-(ENTRIES.length-1)/2)*0.34;
    const rad = 150 + (idx%2)*70;
    e.x = cx + Math.cos(ang)*rad; e.y = baseY - 120 - Math.abs(Math.sin(ang))*120 - (idx%3)*26;
    e.size = 0.9+(entry.impact||3)/10;
    const spr=entry.status==="consumed"?SPR.consumed:SPR.unlit;
    ctx.save(); ctx.globalAlpha=e.base; ctx.translate(e.x,e.y); ctx.drawImage(spr,-44*e.size,-44*e.size,88*e.size,88*e.size); ctx.restore();
  });
  ctx.globalCompositeOperation="source-over";
}

/* ========== GLASS REVIEW PANEL ========== */
const panel=document.getElementById("panel"), pbody=document.getElementById("panelBody");
let lastFocus=null;
function openPanel(entry){
  const consumed=entry.status==="consumed";
  pbody.innerHTML=`
    <button class="item__close" aria-label="Close" id="pClose">&times;</button>
    <div class="item__type">${cap(entry.type)}${consumed?"":" · in the antilibrary"}</div>
    <h2 class="item__title" id="panelTitle">${esc(entry.title)}</h2>
    <div class="item__creator">${esc(entry.creator)}</div>
    <div class="item__meta">
      <span><b>${consumed?"Read":"Queued"}</b> ${esc(entry.date||"")}</span>
      <span><b>Impact</b> ${"●".repeat(entry.impact||0)}${"○".repeat(5-(entry.impact||0))}</span>
      ${entry.via?`<span><b>Via</b> ${esc(entry.via)}</span>`:""}
    </div>
    <div class="item__tags">${(entry.tags||[]).map(t=>`<span>${esc(t)}</span>`).join("")}</div>
    <div class="item-body">${entry.reviewHtml||"<p>—</p>"}</div>`;
  lastFocus=document.activeElement;
  if(typeof panel.showModal==="function") panel.showModal(); else panel.setAttribute("open","");
  panel.querySelector("#pClose").addEventListener("click",closePanel);
}
function closePanel(){ if(panel.open){ panel.close?.(); panel.removeAttribute("open"); } if(lastFocus&&lastFocus.focus) lastFocus.focus(); }
panel.addEventListener("click", e=>{ if(e.target===panel) closePanel(); });   // backdrop click
panel.addEventListener("cancel", ()=>{ /* Esc → native */ });

/* ========== ACCESSIBLE ENTRY LIST (keyboard + screen reader) ========== */
const list=document.getElementById("emberList");
ENTRIES.forEach((e,i)=>{ const a=document.createElement("a");
  a.href="item/"+e.slug+".html"; a.dataset.slug=e.slug;
  a.textContent=e.title+" — "+e.creator;
  a.addEventListener("focus",()=>{ const em=pool.find(p=>p.alive&&p.entry===e); if(em){em.pinned=true;hovered=em;} });
  a.addEventListener("click",ev=>{ ev.preventDefault(); openPanel(e); });
  const li=document.createElement("li"); li.appendChild(a); list.appendChild(li);
});

/* ========== HINT DISMISS ========== */
let hintGone=false;
function dismissHint(){ if(hintGone) return; hintGone=true; setTimeout(()=>document.getElementById("hint").classList.add("gone"),2600); }
setTimeout(dismissHint, 6000);

/* ========== HELPERS ========== */
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mix(a,b,t){ t=clamp(t,0,1); return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function cap(s){ return s? s[0].toUpperCase()+s.slice(1):""; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function debounce(fn,ms){ let t; return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);}; }

/* ========== BOOT ========== */
resize();
buildFlame();
if(reduceMotion){
  frozen=true; drawStaticFrame();
  const n=document.createElement("div"); n.className="reduced-note"; n.textContent="reduced-motion · the fire is still"; document.body.appendChild(n);
  // static embers still hoverable/clickable
  cv.addEventListener("pointermove",e=>hover(e.clientX,e.clientY),{passive:true});
} else {
  start();
}
})();
</script>
