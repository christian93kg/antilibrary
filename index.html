<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Antilibrary</title>
<meta name="description" content="A personal record of the books, films, podcasts, quotes, and yearly Misogi that left a mark — and the pile still waiting to." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
/* ════════════════════════════════════════════════════════════
   THE ANTILIBRARY — glass · glow · ether
   A constellation instead of a fire: nebulae drift behind a
   grid of glass cards, one card per kept thing. Zero deps.
   ════════════════════════════════════════════════════════════ */

:root{
  --bg-0:#05060f;
  --bg-1:#080a1a;
  --ink:#eaf2ff;
  --ink-dim:#9aa8cc;
  --ink-faint:#6b7aa3;
  --glass:rgba(140,160,220,0.045);
  --glass-2:rgba(150,170,230,0.07);
  --hair:rgba(160,185,255,0.14);
  --hair-bright:rgba(180,205,255,0.30);
  --accent:#7fe3ff;
  --accent-soft:rgba(127,227,255,0.14);
  --accent-line:rgba(127,227,255,0.55);
  --ambiance:1;
  --shadow:0 24px 70px -28px rgba(0,0,0,0.85);
}

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; }
body{
  font-family:'Jost',sans-serif;
  background:var(--bg-0);
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
::selection{ background:var(--accent-soft); color:#fff; }

.serif{ font-family:'Cormorant Garamond',serif; }

/* ── ambient layers ─────────────────────────────────────────── */
.sky{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.sky::before{
  content:''; position:absolute; inset:-20%;
  background:
    radial-gradient(60% 50% at 22% 18%, rgba(60,90,200,0.30), transparent 60%),
    radial-gradient(55% 50% at 82% 26%, rgba(150,90,220,0.22), transparent 60%),
    radial-gradient(70% 60% at 50% 96%, rgba(40,140,180,0.20), transparent 60%),
    radial-gradient(90% 90% at 50% 50%, var(--bg-1), var(--bg-0) 78%);
}
.neb{ position:absolute; border-radius:50%; filter:blur(70px); opacity:calc(0.5*var(--ambiance)); mix-blend-mode:screen; }
.neb.a{ width:48vmax; height:48vmax; left:-10vmax; top:-12vmax; background:radial-gradient(circle, rgba(90,130,255,0.55), transparent 65%); animation:drift1 38s ease-in-out infinite; }
.neb.b{ width:42vmax; height:42vmax; right:-12vmax; top:6vmax; background:radial-gradient(circle, rgba(170,110,255,0.5), transparent 65%); animation:drift2 46s ease-in-out infinite; }
.neb.c{ width:50vmax; height:50vmax; left:24vmax; bottom:-22vmax; background:radial-gradient(circle, rgba(60,200,210,0.4), transparent 65%); animation:drift3 52s ease-in-out infinite; }
@keyframes drift1{ 50%{ transform:translate(8vmax,6vmax) scale(1.1);} }
@keyframes drift2{ 50%{ transform:translate(-7vmax,8vmax) scale(1.08);} }
@keyframes drift3{ 50%{ transform:translate(6vmax,-6vmax) scale(1.12);} }

#motes{ position:fixed; inset:0; z-index:1; pointer-events:none; opacity:var(--ambiance); }

/* cursor aura */
.aura{ position:fixed; z-index:2; width:280px; height:280px; left:0; top:0; margin:-140px 0 0 -140px; pointer-events:none;
  background:radial-gradient(circle, var(--accent-soft), transparent 62%); opacity:calc(0.35*var(--ambiance));
  transition:opacity .6s; mix-blend-mode:screen; }

/* grain + vignette */
.grain{ position:fixed; inset:0; z-index:3; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxNDAnIGhlaWdodD0nMTQwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIHR5cGU9J2ZyYWN0YWxOb2lzZScgYmFzZUZyZXF1ZW5jeT0nMC45JyBudW1PY3RhdmVzPScyJy8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsdGVyPSd1cmwoI24pJy8+PC9zdmc+"); }
.vignette{ position:fixed; inset:0; z-index:3; pointer-events:none;
  background:radial-gradient(120% 110% at 50% 42%, transparent 52%, rgba(0,0,0,0.55) 100%); }

/* ── shell ──────────────────────────────────────────────────── */
.stage{ position:relative; z-index:5; height:100%; display:flex; flex-direction:column; }
.scroll{ flex:1; overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth; }
.scroll::-webkit-scrollbar{ width:10px; }
.scroll::-webkit-scrollbar-thumb{ background:linear-gradient(var(--accent-line),transparent); border-radius:20px; border:3px solid transparent; background-clip:padding-box; }
.wrap{ max-width:1320px; margin:0 auto; padding:0 40px; }

/* ── header ─────────────────────────────────────────────────── */
.topbar{ position:sticky; top:0; z-index:30;
  backdrop-filter:blur(18px) saturate(1.3); -webkit-backdrop-filter:blur(18px) saturate(1.3);
  background:linear-gradient(rgba(8,10,26,0.72),rgba(8,10,26,0.30));
  border-bottom:1px solid var(--hair); }
.topbar .wrap{ display:flex; align-items:center; gap:24px; height:78px; }
.brand{ display:flex; align-items:baseline; gap:14px; }
.brand .mark{ font-size:13px; letter-spacing:.46em; text-transform:uppercase; color:var(--ink-faint); font-weight:300; }
.brand h1{ font-size:30px; font-weight:600; margin:0; letter-spacing:.01em;
  background:linear-gradient(180deg,#fff, #b9c8ee 70%); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 34px rgba(150,185,255,0.25); }
.brand .v{ font-size:12px; color:var(--ink-faint); letter-spacing:.2em; }
.topbar .spacer{ flex:1; }
.about-link{ font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-faint);
  background:none; border:none; font-family:'Jost'; cursor:pointer; padding:8px 4px; transition:color .3s; }
.about-link:hover{ color:var(--ink); }

/* search trigger */
.cmd-trigger{ display:flex; align-items:center; gap:12px; height:42px; padding:0 14px 0 16px;
  background:var(--glass); border:1px solid var(--hair); border-radius:12px; color:var(--ink-dim);
  cursor:text; min-width:280px; transition:.35s; }
.cmd-trigger:hover{ border-color:var(--hair-bright); background:var(--glass-2); color:var(--ink); box-shadow:0 0 0 4px var(--accent-soft); }
.cmd-trigger svg{ width:17px; height:17px; opacity:.8; }
.cmd-trigger .ph{ flex:1; font-size:14.5px; }
.kbd{ font-family:'Jost'; font-size:11px; letter-spacing:.08em; color:var(--ink-faint);
  border:1px solid var(--hair); border-radius:6px; padding:3px 7px; background:rgba(255,255,255,0.03); }

/* ── hero / progress constellation ──────────────────────────── */
.hero{ padding:54px 0 30px; }
.hero .eyebrow{ font-size:12.5px; letter-spacing:.4em; text-transform:uppercase; color:var(--accent); opacity:.85; margin-bottom:16px; }
.hero h2{ font-size:64px; line-height:1.02; font-weight:500; margin:0 0 18px; max-width:14ch; letter-spacing:-0.01em;
  background:linear-gradient(180deg,#ffffff,#aebbe0 88%); -webkit-background-clip:text; background-clip:text; color:transparent; }
.hero p{ font-size:17px; line-height:1.6; color:var(--ink-dim); max-width:52ch; margin:0; }
.hero p .hl{ color:var(--accent); }

.orbits{ display:flex; gap:14px; flex-wrap:wrap; margin-top:34px; }
.orbit{ position:relative; display:flex; align-items:center; gap:13px; padding:13px 19px 13px 14px;
  background:var(--glass); border:1px solid var(--hair); border-radius:15px; cursor:pointer;
  transition:transform .4s cubic-bezier(.2,.8,.2,1), border-color .4s, background .4s, box-shadow .4s; }
.orbit:hover{ transform:translateY(-3px); border-color:var(--ec-line); background:var(--glass-2); box-shadow:0 0 30px -8px var(--ec-soft); }
.orbit.on{ border-color:var(--ec-line); box-shadow:0 0 0 1px var(--ec-line), 0 0 34px -10px var(--ec-soft); background:var(--glass-2); }
.ring{ width:42px; height:42px; flex:none; }
.orbit .meta{ display:flex; flex-direction:column; line-height:1.2; }
.orbit .meta .n{ font-size:15px; font-weight:500; color:var(--ink); }
.orbit .meta .s{ font-size:12px; color:var(--ink-faint); letter-spacing:.02em; }

/* ── toolbar (filters/sort) ─────────────────────────────────── */
.toolbar{ display:flex; align-items:center; gap:14px; position:sticky; top:78px; z-index:20;
  padding:18px 0 16px; margin-top:8px; flex-wrap:wrap; }
.chips{ display:flex; gap:9px; flex-wrap:wrap; }
.chip{ height:34px; padding:0 15px; display:inline-flex; align-items:center; gap:8px;
  font-size:13px; letter-spacing:.02em; color:var(--ink-dim); cursor:pointer;
  background:var(--glass); border:1px solid var(--hair); border-radius:999px; transition:.32s; white-space:nowrap; }
.chip:hover{ color:var(--ink); border-color:var(--hair-bright); }
.chip.on{ color:#fff; border-color:var(--ec-line); background:var(--ec-soft); box-shadow:0 0 22px -8px var(--ec-soft); }
.chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--ec, var(--accent)); box-shadow:0 0 8px var(--ec, var(--accent)); }
.chip .ct{ font-size:11px; color:var(--ink-faint); }
.chip.on .ct{ color:rgba(255,255,255,0.7); }
.tb-spacer{ flex:1; }
.seg{ display:flex; background:var(--glass); border:1px solid var(--hair); border-radius:10px; padding:3px; gap:2px; }
.seg button{ font-family:'Jost'; font-size:12.5px; color:var(--ink-faint); background:none; border:none; cursor:pointer;
  padding:6px 13px; border-radius:7px; transition:.28s; letter-spacing:.02em; }
.seg button:hover{ color:var(--ink); }
.seg button.on{ color:#fff; background:var(--accent-soft); box-shadow:inset 0 0 0 1px var(--accent-line); }
.seg button .n{ opacity:.55; font-size:11px; }

/* ── card grid ──────────────────────────────────────────────── */
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; padding:6px 0 40px; }

.card{ position:relative; border-radius:18px; padding:22px 22px 20px; cursor:pointer; overflow:hidden;
  background:linear-gradient(160deg, rgba(255,255,255,0.055), rgba(255,255,255,0.012));
  border:1px solid var(--hair);
  box-shadow:var(--shadow);
  transform-style:preserve-3d; transition:border-color .45s, box-shadow .45s;
  animation:rise .7s both cubic-bezier(.2,.8,.2,1); }
@keyframes rise{ from{ opacity:0; transform:translateY(22px) scale(.985);} }
.card::before{ /* edge glow */
  content:''; position:absolute; inset:0; border-radius:inherit; padding:1px; pointer-events:none; opacity:0; transition:opacity .45s;
  background:linear-gradient(150deg, var(--ec-line), transparent 45%);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; }
.card::after{ /* cursor sheen */
  content:''; position:absolute; width:340px; height:340px; left:var(--mx,50%); top:var(--my,0%);
  transform:translate(-50%,-50%); pointer-events:none; opacity:0; transition:opacity .4s;
  background:radial-gradient(circle, var(--ec-soft), transparent 60%); }
.card:hover{ border-color:var(--ec-line); box-shadow:var(--shadow), 0 0 46px -16px var(--ec-soft); }
.card:hover::before{ opacity:1; }
.card:hover::after{ opacity:.9; }

/* blurred & darkened cover backdrop — only shows once the image loads */
.cardbg{ position:absolute; inset:0; z-index:0; opacity:0; transition:opacity .8s; pointer-events:none; border-radius:inherit; overflow:hidden; }
.cardbg.ok{ opacity:1; }
.cardbg img{ width:100%; height:100%; object-fit:cover; filter:blur(9px) brightness(.69) saturate(1.15); transform:scale(1.2); }
.cardbg::after{ content:''; position:absolute; inset:0; background:linear-gradient(160deg, rgba(10,13,30,.25), rgba(5,6,15,.39)); }
.card > *:not(.cardbg){ position:relative; z-index:1; }
.card::before,.card::after{ z-index:2; }

/* journal-page marker on cards */
.scan-mark{ display:inline-flex; color:var(--ink-faint); }
.scan-mark svg{ width:14px; height:14px; }

.card .row1{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.badge{ display:inline-flex; align-items:center; gap:7px; height:26px; padding:0 11px; border-radius:999px;
  font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ec-text);
  background:var(--ec-soft); border:1px solid var(--ec-line); }
.badge svg{ width:13px; height:13px; }
.card .grow{ flex:1; }
.status-pip{ display:inline-flex; align-items:center; gap:7px; font-size:11.5px; letter-spacing:.05em; color:var(--ink-faint); }
.status-pip i{ width:8px; height:8px; border-radius:50%; display:inline-block; }
.pip-queue i{ background:transparent; border:1.5px solid var(--ink-faint); }
.pip-active i{ background:var(--accent); box-shadow:0 0 9px var(--accent); animation:pulse 2.4s infinite; }
.pip-done i{ background:#9affc0; box-shadow:0 0 9px #9affc0; }
@keyframes pulse{ 50%{ opacity:.4; } }

.card h3{ font-family:'Cormorant Garamond',serif; font-weight:600; font-size:25px; line-height:1.12; margin:0 0 8px;
  letter-spacing:.005em; color:#f3f7ff; }
.card.is-quote h3{ font-size:23px; font-style:italic; font-weight:500; line-height:1.25; }
.card .by{ font-size:13.5px; color:var(--ink-dim); margin:0 0 16px; }
.card .by b{ color:var(--ec-text); font-weight:500; }

.card .foot{ display:flex; align-items:center; gap:10px; margin-top:auto; }
.tagrow{ display:flex; gap:6px; flex-wrap:wrap; }
.tag{ font-size:11px; letter-spacing:.03em; color:var(--ink-faint); padding:3px 9px; border-radius:7px;
  background:rgba(255,255,255,0.04); border:1px solid var(--hair); }

/* empty state */
.empty{ text-align:center; padding:90px 0; color:var(--ink-faint); }
.empty .serif{ font-size:30px; color:var(--ink-dim); margin-bottom:8px; }

/* colophon */
.colophon{ padding:10px 0 56px; font-size:12px; letter-spacing:.06em; color:var(--ink-faint); text-align:center; }
.colophon a{ color:var(--ink-dim); text-decoration:none; border-bottom:1px solid var(--hair); transition:color .3s, border-color .3s; }
.colophon a:hover{ color:var(--accent); border-color:var(--accent-line); }

/* ── detail drawer ──────────────────────────────────────────── */
.scrim{ position:fixed; inset:0; z-index:60; background:rgba(3,4,12,0.6); backdrop-filter:blur(6px);
  opacity:0; pointer-events:none; transition:opacity .5s; }
.scrim.show{ opacity:1; pointer-events:auto; }
.drawer{ position:fixed; top:0; right:0; height:100%; width:min(560px,94vw); z-index:70;
  transform:translateX(104%); transition:transform .62s cubic-bezier(.16,1,.3,1);
  background:linear-gradient(150deg, rgba(20,24,48,0.86), rgba(10,12,28,0.92));
  backdrop-filter:blur(26px) saturate(1.3); -webkit-backdrop-filter:blur(26px) saturate(1.3);
  border-left:1px solid var(--ec-line, var(--hair-bright)); box-shadow:-40px 0 120px -40px #000, inset 1px 0 0 var(--hair-bright);
  display:flex; flex-direction:column; }
.drawer.show{ transform:translateX(0); }
.drawer .dh{ position:relative; padding:34px 36px 26px; border-bottom:1px solid var(--hair); overflow:hidden; }
.drawer .dh::before{ content:''; position:absolute; inset:-40% -10% auto -10%; height:180px; z-index:2;
  background:radial-gradient(60% 100% at 28% 0%, var(--ec-soft, var(--accent-soft)), transparent 70%); pointer-events:none; }
.dhbg{ position:absolute; inset:0; z-index:0; opacity:0; transition:opacity .8s; pointer-events:none; }
.dhbg.ok{ opacity:1; }
.dhbg img{ width:100%; height:100%; object-fit:cover; filter:blur(11px) brightness(.7) saturate(1.15); transform:scale(1.25); }
.dhbg::after{ content:''; position:absolute; inset:0; background:linear-gradient(165deg, rgba(12,15,34,.23), rgba(8,10,24,.43)); }
.drawer .dh > *:not(.dhbg){ position:relative; z-index:3; }
.drawer .dbody{ padding:28px 36px 40px; overflow-y:auto; flex:1; }
.drawer .dbody::-webkit-scrollbar{ width:8px; }
.drawer .dbody::-webkit-scrollbar-thumb{ background:var(--accent-line); border-radius:10px; }
.dclose{ position:absolute; top:24px; right:26px; width:38px; height:38px; border-radius:11px; cursor:pointer;
  display:grid; place-items:center; color:var(--ink-dim); background:var(--glass); border:1px solid var(--hair); transition:.3s; }
.dclose:hover{ color:#fff; border-color:var(--hair-bright); transform:rotate(90deg); }
.dclose svg{ width:18px; height:18px; }
.drawer h2{ font-family:'Cormorant Garamond',serif; font-size:40px; line-height:1.08; font-weight:600; margin:18px 0 6px; color:#fff; max-width:18ch; }
.drawer.is-quote h2{ font-style:italic; font-weight:500; font-size:34px; }
.drawer .dby{ font-size:15px; color:var(--ink-dim); }
.drawer .dby b{ color:var(--ec-text); }
.kv{ display:flex; gap:10px; flex-wrap:wrap; margin:22px 0 26px; }
.kv .cell{ flex:1; min-width:120px; padding:14px 16px; border-radius:13px; background:var(--glass); border:1px solid var(--hair); }
.kv .cell .l{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:5px; }
.kv .cell .vv{ font-size:18px; color:var(--ink); font-family:'Cormorant Garamond',serif; font-weight:600; }
.kv .cell .vv.impact{ letter-spacing:.18em; color:var(--ec-text, var(--ink)); font-size:15px; }
.dnote{ font-size:15.5px; line-height:1.72; color:#cdd8f4; font-weight:300; }
.dnote p{ margin:0 0 16px; }
.dnote blockquote{ margin:20px 0; padding:4px 0 4px 20px; border-left:2px solid var(--ec-line, var(--accent-line));
  font-family:'Cormorant Garamond',serif; font-style:italic; font-size:19px; color:var(--ink); }
.dnote em.unlit{ color:var(--ec-text, var(--accent)); font-style:italic; }
.dsection-t{ font-size:11.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-faint); margin:30px 0 14px; }

/* read-more expander */
.more-btn{ display:inline-flex; align-items:center; gap:9px; margin-top:6px; padding:11px 18px; cursor:pointer;
  font-family:'Jost'; font-size:13px; letter-spacing:.06em; color:var(--ink-dim);
  background:var(--glass); border:1px solid var(--hair); border-radius:11px; transition:.3s; }
.more-btn:hover{ color:#fff; border-color:var(--ec-line, var(--hair-bright)); background:var(--ec-soft, var(--glass-2)); }
.dnote.full{ display:none; }
.dnote.full.open{ display:block; animation:rise .5s both cubic-bezier(.2,.8,.2,1); }

/* journal-page chip → lightbox */
.scan-chip{ display:flex; align-items:center; gap:14px; width:100%; padding:12px; cursor:pointer; text-align:left;
  font-family:'Jost'; font-size:13.5px; color:var(--ink-dim);
  background:var(--glass); border:1px solid var(--hair); border-radius:13px; transition:.3s; }
.scan-chip:hover{ color:#fff; border-color:var(--ec-line, var(--hair-bright)); box-shadow:0 0 28px -12px var(--ec-soft, var(--accent-soft)); }
.scan-chip img{ width:54px; height:70px; object-fit:cover; border-radius:7px; border:1px solid var(--hair-bright);
  background:rgba(255,255,255,.04); }
.scan-chip.noimg img{ display:none; }
.scan-chip .sc-sub{ display:block; font-size:11.5px; letter-spacing:.05em; color:var(--ink-faint); margin-top:3px; }
.lightbox{ position:fixed; inset:0; z-index:120; display:grid; place-items:center; padding:30px; cursor:zoom-out;
  background:rgba(3,4,12,0.88); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  opacity:0; pointer-events:none; transition:opacity .35s; }
.lightbox.show{ opacity:1; pointer-events:auto; }
.lightbox img{ max-width:92vw; max-height:92vh; border-radius:8px; border:1px solid var(--hair-bright);
  box-shadow:0 60px 140px -40px #000, 0 0 90px -30px var(--accent-soft);
  transform:scale(.96); transition:transform .35s cubic-bezier(.16,1,.3,1); }
.lightbox.show img{ transform:none; }

/* ── command palette ────────────────────────────────────────── */
.pal-scrim{ position:fixed; inset:0; z-index:90; background:rgba(3,4,12,0.55); backdrop-filter:blur(10px);
  opacity:0; pointer-events:none; transition:opacity .35s; display:flex; align-items:flex-start; justify-content:center; }
.pal-scrim.show{ opacity:1; pointer-events:auto; }
.palette{ margin-top:13vh; width:min(680px,92vw); border-radius:20px; overflow:hidden;
  background:linear-gradient(160deg, rgba(22,26,54,0.92), rgba(10,12,30,0.96));
  border:1px solid var(--hair-bright); box-shadow:0 50px 130px -30px #000, 0 0 0 1px rgba(255,255,255,0.04), 0 0 80px -30px var(--accent-soft);
  transform:translateY(-14px) scale(.97); opacity:0; transition:transform .4s cubic-bezier(.16,1,.3,1), opacity .4s; }
.pal-scrim.show .palette{ transform:none; opacity:1; }
.pal-in{ display:flex; align-items:center; gap:14px; padding:20px 24px; border-bottom:1px solid var(--hair); }
.pal-in svg{ width:21px; height:21px; color:var(--accent); }
.pal-in input{ flex:1; background:none; border:none; outline:none; color:#fff; font-family:'Jost'; font-size:19px; letter-spacing:.01em; }
.pal-in input::placeholder{ color:var(--ink-faint); }
.pal-list{ max-height:48vh; overflow-y:auto; padding:8px; }
.pal-list::-webkit-scrollbar{ width:8px; }

const ABOUT_HTML = `<p>A shelf of the things that stuck with me — and the far larger pile still waiting to. Each card is one of them; the constellation is the library. The reviews are mostly notes to my future self. Updated when I feel like it.</p>
<p>The name is Taleb's: an <em>antilibrary</em> is the collection of unread books — the ones that keep you curious.</p>`;

/* ========== CATEGORIES & ACCENTS ========== */
const CATEGORIES = [
  { key:"book",    label:"Books",    accent:"cyan",   doneVerb:"read"     },
  { key:"film",    label:"Films",    accent:"rose",   doneVerb:"watched"  },
  { key:"podcast", label:"Podcasts", accent:"teal",   doneVerb:"running"  },
  { key:"quote",   label:"Quotes",   accent:"violet", doneVerb:"kept"     },
  { key:"misogi",  label:"Misogi",   accent:"gold",   doneVerb:"completed"},
];
const ACCENTS = {
  cyan:   { glow:"#7fe3ff", soft:"rgba(127,227,255,0.14)", line:"rgba(127,227,255,0.55)", text:"#bfeeff" },
  violet: { glow:"#b69cff", soft:"rgba(182,156,255,0.14)", line:"rgba(182,156,255,0.55)", text:"#dccfff" },
  teal:   { glow:"#67f0d0", soft:"rgba(103,240,208,0.13)", line:"rgba(103,240,208,0.5)",  text:"#c3fff0" },
  gold:   { glow:"#ffd98a", soft:"rgba(255,217,138,0.14)", line:"rgba(255,217,138,0.55)", text:"#ffeec4" },
  rose:   { glow:"#ff9ec4", soft:"rgba(255,158,196,0.14)", line:"rgba(255,158,196,0.5)",  text:"#ffd4e6" },
};
const CAT = Object.fromEntries(CATEGORIES.map(c=>[c.key,c]));

/* status normalisation: consumed→done · to-consume→queue · kept→done (quotes live as kept) */
function statusKey(e){
  if(e.status==="consumed"||e.status==="kept") return "done";
  if(e.status==="in-progress") return "active";
  return "queue";
}
function statusVerb(e){
  const k=statusKey(e);
  if(e.type==="quote") return "Kept";
  if(e.type==="misogi") return k==="done"?"Done":"Planned";
  return k==="done"?"Done":k==="active"?"In progress":"Queue";
}

/* ========== ICONS (24×24 stroke) ========== */
const icon = (paths)=>`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
const ICONS = {
  book:    icon('<path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5z"/><path d="M4 20.5A2.5 2.5 0 0 1 6.5 18H20v3H6.5A2.5 2.5 0 0 1 4 20.5z"/>'),
  film:    icon('<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14M17 5v14M3 9.5h4M3 14.5h4M17 9.5h4M17 14.5h4"/>'),
  quote:   icon('<path d="M9 7c-2.5 1-4 3.2-4 6v4h5v-5H7c0-1.8.8-3.3 2.5-4.2zM19 7c-2.5 1-4 3.2-4 6v4h5v-5h-3c0-1.8.8-3.3 2.5-4.2z"/>'),
  podcast: icon('<rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0M12 17.5V21M8.5 21h7"/>'),
  misogi:  icon('<path d="M3 19h18L15 7l-3 5-2-3z"/><path d="M12.5 9.5 15 7"/><circle cx="17.5" cy="5.5" r="1.6"/>'),
  close:   icon('<path d="M6 6 18 18M18 6 6 18"/>'),
  page:    icon('<path d="M6 3h8l4 4v14H6z"/><path d="M14 3v4h4M9 12h6M9 16h6"/>'),
};

/* ========== HELPERS ========== */
const $=(s)=>document.querySelector(s);
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function accentStyle(key){
  const a=ACCENTS[CAT[key]?.accent]||ACCENTS.cyan;
  return `--ec:${a.glow};--ec-soft:${a.soft};--ec-line:${a.line};--ec-text:${a.text}`;
}
const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ========== STATE ========== */
let cat="all", status="all", sort="curated";

/* ========== HERO LINE ========== */
(function(){
  const total=ENTRIES.length, done=ENTRIES.filter(e=>statusKey(e)==="done").length;
  $("#heroLine").innerHTML =
    `An antilibrary is the collection of unread books — the ones that keep you curious. `+
    `This is mine, extended: ${total} kept things across five orbits, with ${done} already lived. `+
    `Press <span class="hl">⌘K</span> to find any of them in an instant.`;
})();

/* ========== ORBITS (hero progress rings) ========== */
function ringSvg(pct, accentKey, iconKey){
  const a=ACCENTS[accentKey], R=16, C=2*Math.PI*R, off=C*(1-pct);
  return `<svg class="ring" viewBox="0 0 42 42">
    <circle cx="21" cy="21" r="${R}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2.5"/>
    <circle cx="21" cy="21" r="${R}" fill="none" stroke="${a.glow}" stroke-width="2.5" stroke-linecap="round"
      stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 21 21)"
      style="filter:drop-shadow(0 0 5px ${a.glow})"/>
    <g transform="translate(12.5 12.5)" style="color:${a.glow}">
      <g style="width:17px;height:17px">${ICONS[iconKey].replace('<svg ','<svg width="17" height="17" ')}</g>
    </g>
  </svg>`;
}
function renderOrbits(){
  $("#orbits").innerHTML = CATEGORIES.map(c=>{
    const set=ENTRIES.filter(e=>e.type===c.key);
    const done=set.filter(e=>statusKey(e)==="done").length;
    const pct=set.length?done/set.length:0;
    return `<div class="orbit ${cat===c.key?"on":""}" data-cat="${c.key}" style="${accentStyle(c.key)}" role="button" tabindex="0">
      ${ringSvg(pct,c.accent,c.key)}
      <span class="meta"><span class="n">${c.label}</span><span class="s">${done}/${set.length} ${c.doneVerb}</span></span>
    </div>`;
  }).join("");
  document.querySelectorAll(".orbit").forEach(el=>{
    const go=()=>{ setCat(cat===el.dataset.cat?"all":el.dataset.cat); };
    el.addEventListener("click",go);
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } });
  });
}

/* ========== TOOLBAR ========== */
function renderChips(){
  const counts={ all:ENTRIES.length };
  CATEGORIES.forEach(c=> counts[c.key]=ENTRIES.filter(e=>e.type===c.key).length);
  $("#chips").innerHTML =
    `<span class="chip ${cat==="all"?"on":""}" data-cat="all">All <span class="ct">${counts.all}</span></span>`+
    CATEGORIES.map(c=>`<span class="chip ${cat===c.key?"on":""}" data-cat="${c.key}" style="${accentStyle(c.key)}">
      <span class="dot"></span>${c.label} <span class="ct">${counts[c.key]}</span></span>`).join("");
  document.querySelectorAll(".chip").forEach(el=>
    el.addEventListener("click",()=> setCat(el.dataset.cat==="all"?"all":(cat===el.dataset.cat?"all":el.dataset.cat))));
}
function renderSegs(){
  const buckets={ all:ENTRIES.length,
    queue:ENTRIES.filter(e=>statusKey(e)==="queue").length,
    done:ENTRIES.filter(e=>statusKey(e)==="done").length };
  $("#statusSeg").innerHTML = [["all","All"],["queue","Queue"],["done","Lived"]]
    .map(([k,l])=>`<button class="${status===k?"on":""}" data-status="${k}">${l} <span class="n">${buckets[k]}</span></button>`).join("");
  $("#sortSeg").innerHTML = [["curated","Curated"],["title","A–Z"],["recent","Recent"]]
    .map(([k,l])=>`<button class="${sort===k?"on":""}" data-sort="${k}">${l}</button>`).join("");
  document.querySelectorAll("#statusSeg button").forEach(b=> b.addEventListener("click",()=>{ status=b.dataset.status; renderAll(); }));
  document.querySelectorAll("#sortSeg button").forEach(b=> b.addEventListener("click",()=>{ sort=b.dataset.sort; renderAll(); }));
}

function setCat(k){ cat=k; renderAll(); }

/* ========== CARDS ========== */
function visibleEntries(){
  let list=ENTRIES.filter(e=> (cat==="all"||e.type===cat) && (status==="all"||statusKey(e)===status));
  if(sort==="title") list=[...list].sort((a,b)=>a.title.localeCompare(b.title));
  else if(sort==="recent") list=[...list].sort((a,b)=>(b.sortKey||0)-(a.sortKey||0));
  return list;
}
function coverLayer(src, cls){
  return src ? `<div class="${cls}"><img src="${esc(src)}" alt="" loading="lazy"
    onload="this.parentNode.classList.add('ok')" onerror="this.parentNode.remove()"></div>` : "";
}
function cardHtml(e,i){
  const isQuote=e.type==="quote", sk=statusKey(e);
  const by = !e.creator ? ""
           : isQuote ? `<p class="by">— <b>${esc(e.creator)}</b></p>`
                     : `<p class="by">by <b>${esc(e.creator)}</b></p>`;
  return `<article class="card ${isQuote?"is-quote":""}" data-slug="${e.slug}"
      style="${accentStyle(e.type)};animation-delay:${Math.min(i,12)*0.045}s" tabindex="0" role="button"
      aria-label="${esc(e.title)}">
    ${coverLayer(e.cover,"cardbg")}
    <div class="row1">
      <span class="badge">${ICONS[e.type]}${e.type}</span>
      <span class="grow"></span>
      ${e.scan?`<span class="scan-mark" title="journal page scanned">${ICONS.page}</span>`:""}
      <span class="status-pip pip-${sk}"><i></i>${statusVerb(e)}</span>
    </div>
    <h3>${isQuote?"“"+esc(e.title)+"”":esc(e.title)}</h3>
    ${by}
    <div class="foot"><div class="tagrow">${(e.tags||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div></div>
  </article>`;
}
function renderGrid(){
  const list=visibleEntries();
  $("#grid").innerHTML=list.map(cardHtml).join("");
  $("#emptyState").hidden=list.length>0;
  document.querySelectorAll(".card").forEach(el=>{
    const entry=ENTRIES.find(e=>e.slug===el.dataset.slug);
    el.addEventListener("click",()=>openDrawer(entry));
    el.addEventListener("keydown",e=>{ if(e.key==="Enter"){ openDrawer(entry); } });
    if(!reduceMotion){
      el.addEventListener("mousemove",ev=>{
        const r=el.getBoundingClientRect();
        const px=(ev.clientX-r.left)/r.width, py=(ev.clientY-r.top)/r.height;
        el.style.setProperty("--mx",(px*100)+"%"); el.style.setProperty("--my",(py*100)+"%");
        el.style.transform=`perspective(900px) rotateX(${(py-0.5)*-5}deg) rotateY(${(px-0.5)*6}deg) translateY(-4px)`;
      });
      el.addEventListener("mouseleave",()=>{ el.style.transform=""; });
    }
  });
}
function renderAll(){ renderOrbits(); renderChips(); renderSegs(); renderGrid(); }

/* ========== DRAWER ========== */
const drawer=$("#drawer"), scrim=$("#scrim");
let drawerOpen=false, lastFocus=null;
function factsFor(e){
  const f=[];
  const dots=n=>"●".repeat(n)+"○".repeat(5-n);
  const cleanDate=(e.date||"").replace(/^(queued|planned)\s*·?\s*/,"");
  if(e.type==="quote"){ if(e.source) f.push(["Source",esc(e.source),""]); }
  else if(e.type==="misogi"){ f.push([statusKey(e)==="done"?"Year":"Planned",esc(cleanDate),""]); }
  else{
    f.push([statusKey(e)==="done"?(e.type==="film"?"Released":e.type==="podcast"?"Cadence":"Read"):"Queued", esc(cleanDate),""]);
    if(e.impact) f.push(["Impact",dots(e.impact),"impact"]);
    if(e.via) f.push(["Via",esc(e.via),""]);
  }
  return f;
}
function openDrawer(e, fromPalette){
  const isQuote=e.type==="quote";
  drawer.className=`drawer ${isQuote?"is-quote":""}`;
  drawer.style.cssText=accentStyle(e.type);
  // summary-first: short note up top, full marginalia behind the expander
  const marginalia = !e.reviewHtml ? "" : e.summary
    ? `<div class="dsection-t">Marginalia</div>
       <p class="dnote">${esc(e.summary)}</p>
       <button class="more-btn" id="moreBtn">Read the full note <span aria-hidden="true">↓</span></button>
       <div class="dnote full" id="fullNote">${e.reviewHtml}</div>`
    : `<div class="dsection-t">Marginalia</div><div class="dnote">${e.reviewHtml}</div>`;
  const scanChip = !e.scan ? "" :
    `<div class="dsection-t">Journal page</div>
     <button class="scan-chip" id="scanChip">
       <img src="${esc(e.scan)}" alt="" onerror="this.closest('button').classList.add('noimg')">
       <span>Handwritten entry, scanned<span class="sc-sub">tap to view full page</span></span>
     </button>`;
  drawer.innerHTML=`
    <div class="dh">
      ${coverLayer(e.cover,"dhbg")}
      <button class="dclose" id="dclose" aria-label="Close">${ICONS.close}</button>
      <span class="badge">${ICONS[e.type]}${e.type}</span>
      <h2>${isQuote?"“"+esc(e.title)+"”":esc(e.title)}</h2>
      ${e.creator?`<div class="dby">${isQuote?"— ":"by "}<b>${esc(e.creator)}</b></div>`:""}
    </div>
    <div class="dbody">
      <div class="kv">${factsFor(e).map(([l,v,cls])=>`<div class="cell"><div class="l">${l}</div><div class="vv ${cls}">${v}</div></div>`).join("")}</div>
      ${marginalia}
      ${scanChip}
      ${(e.tags&&e.tags.length)?`<div class="dsection-t">Threads</div><div class="tagrow">${e.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>`:""}
    </div>`;
  $("#dclose").addEventListener("click",closeDrawer);
  const mb=$("#moreBtn");
  if(mb) mb.addEventListener("click",()=>{ $("#fullNote").classList.add("open"); mb.remove(); });
  const sc=$("#scanChip");
  if(sc) sc.addEventListener("click",()=>openLightbox(e.scan));
  lastFocus=fromPalette?null:document.activeElement;
  drawerOpen=true;
  requestAnimationFrame(()=>{ scrim.classList.add("show"); drawer.classList.add("show"); $("#dclose").focus(); });
}
function openAbout(){
  drawer.className="drawer"; drawer.style.cssText="";
  drawer.innerHTML=`
    <div class="dh">
      <button class="dclose" id="dclose" aria-label="Close">${ICONS.close}</button>
      <h2>About</h2>
      <div class="dby">a commonplace book, kept in the open</div>
    </div>
    <div class="dbody"><div class="dnote">${ABOUT_HTML}</div></div>`;
  $("#dclose").addEventListener("click",closeDrawer);
  lastFocus=document.activeElement;
  drawerOpen=true;
  requestAnimationFrame(()=>{ scrim.classList.add("show"); drawer.classList.add("show"); $("#dclose").focus(); });
}
function closeDrawer(){
  drawerOpen=false;
  scrim.classList.remove("show"); drawer.classList.remove("show");
  if(lastFocus&&lastFocus.focus) lastFocus.focus();
}
scrim.addEventListener("click",closeDrawer);
$("#aboutLink").addEventListener("click",openAbout);

/* ========== LIGHTBOX (journal-page scans) ========== */
const lightbox=$("#lightbox"), lightboxImg=$("#lightboxImg");
let lightboxOpen=false;
function openLightbox(src){ lightboxImg.src=src; lightboxOpen=true; lightbox.classList.add("show"); }
function closeLightbox(){ lightboxOpen=false; lightbox.classList.remove("show"); }
lightbox.addEventListener("click",closeLightbox);

/* ========== COMMAND PALETTE ========== */
const palScrim=$("#palScrim"), palInput=$("#palInput"), palList=$("#palList"), palCount=$("#palCount");
let palOpen=false, palSel=0, palResults=[];
function palSearch(q){
  const term=q.trim().toLowerCase();
  return ENTRIES.map(e=>{
    const hay=`${e.title} ${e.creator||""} ${e.source||""} ${(e.tags||[]).join(" ")} ${e.type}`.toLowerCase();
    let score=0;
    if(!term) score=1;
    else if(e.title.toLowerCase().startsWith(term)) score=100;
    else if(e.title.toLowerCase().includes(term)) score=70;
    else if(hay.includes(term)) score=40;
    else{ let i=0; for(const ch of hay){ if(ch===term[i]) i++; if(i===term.length) break; } if(term.length&&i===term.length) score=12; }
    return { e, score };
  }).filter(r=>r.score>0).sort((x,y)=>y.score-x.score||x.e.title.localeCompare(y.e.title)).slice(0,40).map(r=>r.e);
}
function highlight(text,q){
  const term=q.trim(); if(!term) return esc(text);
  const i=text.toLowerCase().indexOf(term.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+"<em>"+esc(text.slice(i,i+term.length))+"</em>"+esc(text.slice(i+term.length));
}
function renderPal(){
  const q=palInput.value;
  palResults=palSearch(q);
  palSel=Math.min(palSel,Math.max(0,palResults.length-1));
  if(!palResults.length){ palList.innerHTML=`<div class="pal-empty">Nothing in the stacks by that name.</div>`; }
  else{
    const order=[], map={};
    palResults.forEach(e=>{ if(!map[e.type]){ map[e.type]=[]; order.push(e.type); } map[e.type].push(e); });
    let fi=-1;
    palList.innerHTML=order.map(t=>`<div><div class="pal-group">${t==="misogi"?"Misogi":t+"s"}</div>`+
      map[t].map(e=>{
        fi++;
        const sub=e.type==="quote"?e.creator:e.creator;
        return `<div class="pal-item ${fi===palSel?"sel":""}" data-i="${fi}" style="${accentStyle(e.type)}">
          <span class="pi-ic">${ICONS[e.type]}</span>
          <span class="pi-main">
            <div class="pi-t">${highlight(e.type==="quote"?"“"+e.title+"”":e.title,q)}</div>
            <div class="pi-s">${esc(sub||"")}</div>
          </span></div>`;
      }).join("")+`</div>`).join("");
    palList.querySelectorAll(".pal-item").forEach(el=>{
      el.addEventListener("mouseenter",()=>{ palSel=+el.dataset.i; markSel(); });
      el.addEventListener("click",()=>pickPal(+el.dataset.i));
    });
  }
  palCount.textContent=`${palResults.length} of ${ENTRIES.length}`;
}
function markSel(){
  palList.querySelectorAll(".pal-item").forEach(el=> el.classList.toggle("sel",+el.dataset.i===palSel));
  const el=palList.querySelector(".pal-item.sel"); if(el&&el.scrollIntoView) el.scrollIntoView({block:"nearest"});
}
function pickPal(i){
  const e=palResults[i]; if(!e) return;
  closePal();
  setTimeout(()=>openDrawer(e,true),120);
}
function openPal(){ palOpen=true; palScrim.classList.add("show"); palInput.value=""; palSel=0; renderPal(); setTimeout(()=>palInput.focus(),60); }
function closePal(){ palOpen=false; palScrim.classList.remove("show"); palInput.blur(); }
palInput.addEventListener("input",()=>{ palSel=0; renderPal(); });
palScrim.addEventListener("mousedown",e=>{ if(e.target===palScrim) closePal(); });
$("#cmdTrigger").addEventListener("click",openPal);
$("#cmdTrigger").addEventListener("keydown",e=>{ if(e.key==="Enter") openPal(); });

/* ========== GLOBAL KEYS ========== */
addEventListener("keydown",e=>{
  if(e.key==="Escape"&&lightboxOpen){ e.preventDefault(); closeLightbox(); return; }
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); palOpen?closePal():openPal(); return; }
  if(palOpen){
    if(e.key==="ArrowDown"){ e.preventDefault(); palSel=Math.min(palResults.length-1,palSel+1); markSel(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); palSel=Math.max(0,palSel-1); markSel(); }
    else if(e.key==="Enter"){ e.preventDefault(); pickPal(palSel); }
    else if(e.key==="Escape"){ e.preventDefault(); closePal(); }
    return;
  }
  if(e.key==="Escape"&&drawerOpen){ closeDrawer(); return; }
  if(e.key==="/"&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){ e.preventDefault(); openPal(); }
});

/* ========== CURSOR AURA ========== */
const aura=$("#aura");
addEventListener("pointermove",e=>{ aura.style.transform=`translate(${e.clientX}px,${e.clientY}px)`; },{passive:true});

/* ========== FLOATING MOTES ========== */
(function(){
  if(reduceMotion) return;
  const c=$("#motes"), ctx=c.getContext("2d");
  let w,h,parts=[];
  const DPR=Math.min(2,devicePixelRatio||1);
  function resize(){ w=c.width=innerWidth*DPR; h=c.height=innerHeight*DPR; c.style.width=innerWidth+"px"; c.style.height=innerHeight+"px"; }
  resize(); addEventListener("resize",resize);
  const N=Math.min(70,Math.floor(innerWidth/22));
  for(let i=0;i<N;i++) parts.push({
    x:Math.random()*innerWidth*DPR, y:Math.random()*innerHeight*DPR, r:(Math.random()*1.6+0.4)*DPR,
    vy:-(Math.random()*0.22+0.04)*DPR, vx:(Math.random()-.5)*0.12*DPR,
    a:Math.random()*0.6+0.2, tw:Math.random()*Math.PI*2, sp:Math.random()*0.02+0.005,
    hue:Math.random()<0.5?"190,225,255":(Math.random()<0.5?"190,170,255":"150,240,220")
  });
  (function loop(){
    ctx.clearRect(0,0,w,h);
    for(const p of parts){
      p.y+=p.vy; p.x+=p.vx; p.tw+=p.sp;
      if(p.y<-10){ p.y=h+10; p.x=Math.random()*w; }
      const a=p.a*(0.55+0.45*Math.sin(p.tw));
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7);
      ctx.fillStyle=`rgba(${p.hue},${a})`; ctx.shadowBlur=8*DPR; ctx.shadowColor=`rgba(${p.hue},${a})`;
      ctx.fill();
    }
    requestAnimationFrame(loop);
  })();
})();

/* ========== BOOT ========== */
renderAll();
})();
</script>
</body>
</html>
